{{- /*
  WARNING: This template creates a Kubernetes Secret with placeholder values.
  In production, override secret values using one of:
    1. helm install --set secrets.anthropicAuthToken=<token> ...
    2. An External Secrets Operator pointing to a secrets backend
    3. A sealed-secrets controller
  Never commit real secret values to values.yaml or any file in helm/
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gardener-ai-mcp.fullname" . }}
  labels:
    {{- include "gardener-ai-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_AUTH_TOKEN: {{ .Values.secrets.anthropicAuthToken | b64enc | quote }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | b64enc | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | b64enc | quote }}
