apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gardener-ai-mcp.fullname" . }}
  labels:
    {{- include "gardener-ai-mcp.labels" . | nindent 4 }}
data:
  MCP_TRANSPORT: {{ .Values.config.transport | quote }}
  EMBEDDING_MODEL: {{ .Values.config.embeddingModel | quote }}
  EMBEDDING_DIMENSIONS: {{ .Values.config.embeddingDimensions | quote }}
  API_TIMEOUT_MS: {{ .Values.config.apiTimeoutMs | quote }}
  ANTHROPIC_MODEL: {{ .Values.config.anthropicModel | quote }}
  HYPERSPACE_OPENAI_BASE_URL: {{ .Values.config.hyperspaceOpenaiBaseUrl | quote }}
  ANTHROPIC_BASE_URL: {{ .Values.config.anthropicBaseUrl | quote }}
  {{- if .Values.qdrant.enabled }}
  QDRANT_URL: "http://{{ include "gardener-ai-mcp.fullname" . }}-qdrant:6333"
  {{- else }}
  QDRANT_URL: {{ .Values.config.qdrantUrl | quote }}
  {{- end }}
